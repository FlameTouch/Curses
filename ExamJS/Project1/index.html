<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Name/Value Pair Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card" role="main">
    <h1 class="card-title">Test</h1>

    <div class="section">
        <label class="section-label" for="pairInput">Name/Value Pair</label>
        <div class="input-row">
            <input
                    type="text"
                    id="pairInput"
                    placeholder="Name = Value"
                    aria-label="Name/Value pair input"
                    autocomplete="off"
                    spellcheck="false"
            />
            <button class="btn-primary" id="addBtn" onclick="addPair()">Add</button>
        </div>

        <p class="error-msg hidden" id="errorMsg" role="alert" aria-live="polite"></p>
    </div>

    <div class="section">
        <label class="section-label" for="pairList">Name/Value Pair List</label>
        <div class="list-row">
            <select id="pairList" multiple aria-label="Name/Value pair list"></select>

            <div class="btn-stack">
                <button class="btn-secondary" onclick="sortByName()">Sort by Name</button>
                <button class="btn-secondary" onclick="sortByValue()">Sort by Value</button>
                <button class="btn-danger"    onclick="deleteSelected()">Delete</button>
            </div>
        </div>
    </div>

    <p class="status" id="statusBar">0 pairs</p>
</div>
<script src="script.js"></script>
</body>
</html>
