<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Preloader 1</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#111827;
        }

        .container{
            display:flex;
            gap:15px;
        }

        .cube{
            width:30px;
            height:30px;
            background:#3b82f6;
            animation:pulse 1.2s infinite ease-in-out;
        }

        .cube:nth-child(2){
            animation-delay:0.2s;
        }

        .cube:nth-child(3){
            animation-delay:0.4s;
        }

        @keyframes pulse{
            0%,100%{
                transform:scale(1);
                opacity:0.5;
            }

            50%{
                transform:scale(1.6);
                opacity:1;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
    </div>
</body>
</html>
