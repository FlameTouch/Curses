<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cards</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 132px;
        }
        .card{
            width: 319px;
            height: 492px;
            border: 4px solid #554C4C;
            background: rgba(217,217,217,0.30);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
        }
        .logo{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #554C4C;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: -50px;
            background: #ffffff;
        }
        .card h1,h3{
            color:#000;
            font-family: 'Inter', sans-serif;
            font-size: 40px;
            font-weight: 400;
            font-style: normal;
            line-height: normal;
        }
        .card p{
            color: #000;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 400;
            font-style: normal;
            line-height: normal;
            width: 256.8px;
        }
        .green-border{
            border: 4px solid #65856E;
        }
        img{
            width: 60px;
            height: 60px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="../hw7_1/img/game.png" alt="Game">
        </div>
        <h1>Lorem</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit</p>
    </div>
    <div class="card green-border">
        <div class="logo green-border">
            <img src="../hw7_1/img/chess.png" alt="Chess">
        </div>
        <h3>Lorem</h3>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit</p>
    </div>
    <div class="card">
        <div class="logo">
            <img src="../hw7_1/img/message.png" alt="Message">
        </div>
        <h3>Lorem</h3>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit</p>
    </div>
</body>
</html>
