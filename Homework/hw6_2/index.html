<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body{
            height: 100vh;
            margin: 0;
            background: cadetblue;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .container{
            background: white;
            width: 35vw;
            height: 40vh;
            border-radius: 20px;
        }
        .container div:nth-child(1){
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(0,139,139,0.35);
            height: 20%;
            border-radius: 20px 20px 0 0;
        }
        .container div:nth-child(1) h1{
            font-size: 26px;
            font-weight: 400;
        }
        .container form{
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
            margin: 40px;
        }
        input[type="text"], input[type="password"]{
            width: 300px;
            height: 30px;
            margin: 15px;
        }
        .container>form>div{
            width: 300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        form input[type="submit"]{
            background-color: rgb(0,139,139,0.35);
            border-radius: 20px;
            border: 1px solid;
            width: 80px;
            height: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <h1>Вхід в особистий кабінет</h1>
        </div>
        <form>
            <input type="text" placeholder="Логін або email">
            <input type="password" placeholder="Пароль">
            <div>
                <label>
                    Запам'ятати мене
                    <input type="checkbox" name="remember">
                </label>
                <input type="submit" name="Вхід">
            </div>
        </form>
    </div>
</body>
</html>
